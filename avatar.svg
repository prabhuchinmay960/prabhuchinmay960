<svg width="360" height="360" viewBox="0 0 360 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chinmay Prabhu — 3D avatar">
  <defs>
    <!-- backdrop -->
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#1A1A22"/>
      <stop offset="62%" stop-color="#0C0C10"/>
      <stop offset="100%" stop-color="#060608"/>
    </radialGradient>
    <!-- lime stage glow -->
    <radialGradient id="limeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C7F84E" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#C7F84E" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#C7F84E" stop-opacity="0"/>
    </radialGradient>
    <!-- face shading, light from top-left -->
    <radialGradient id="face" cx="38%" cy="30%" r="78%">
      <stop offset="0%" stop-color="#F0BC8B"/>
      <stop offset="48%" stop-color="#CE925C"/>
      <stop offset="82%" stop-color="#A06A3C"/>
      <stop offset="100%" stop-color="#7C4F2B"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#352A1E"/>
      <stop offset="100%" stop-color="#0E0A06"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#23232E"/>
      <stop offset="100%" stop-color="#101015"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C7F84E"/>
      <stop offset="55%" stop-color="#7BD96B"/>
      <stop offset="100%" stop-color="#39B6C7"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
    <clipPath id="circle"><circle cx="180" cy="180" r="160"/></clipPath>
  </defs>

  <!-- badge -->
  <circle cx="180" cy="180" r="160" fill="url(#bg)"/>
  <g clip-path="url(#circle)">
    <ellipse cx="180" cy="150" rx="150" ry="130" fill="url(#limeGlow)" opacity="0.85"/>

    <!-- back orbit ring -->
    <g transform="rotate(-20 180 196)" opacity="0.55">
      <ellipse cx="180" cy="196" rx="140" ry="50" fill="none" stroke="url(#ringGrad)" stroke-width="2"
               stroke-dasharray="2 9" stroke-linecap="round"/>
    </g>

    <!-- shoulders / shirt -->
    <path d="M70 360 C 78 286 124 250 180 250 C 236 250 282 286 290 360 Z" fill="url(#shirt)"/>
    <path d="M180 250 C 168 274 192 274 180 250" fill="none"/>
    <path d="M156 254 C 168 286 192 286 204 254" fill="none" stroke="#C7F84E" stroke-width="2.4"
          stroke-linecap="round" opacity="0.85"/>
    <path d="M122 268 C 140 300 150 332 150 360" fill="none" stroke="#2C2C38" stroke-width="2"/>
    <path d="M238 268 C 220 300 210 332 210 360" fill="none" stroke="#2C2C38" stroke-width="2"/>

    <!-- neck -->
    <path d="M156 224 L156 252 C 168 266 192 266 204 252 L204 224 Z" fill="#A06A3C"/>
    <ellipse cx="180" cy="232" rx="26" ry="10" fill="#000" opacity="0.18" filter="url(#soft)"/>

    <!-- ears -->
    <ellipse cx="116" cy="180" rx="11" ry="17" fill="#B27B4A"/>
    <ellipse cx="244" cy="180" rx="11" ry="17" fill="#9C6739"/>

    <!-- face -->
    <ellipse cx="180" cy="172" rx="67" ry="77" fill="url(#face)"/>
    <!-- chin / jaw shadow -->
    <ellipse cx="180" cy="226" rx="40" ry="20" fill="#6E441F" opacity="0.35" filter="url(#soft)"/>
    <!-- cheek highlight -->
    <ellipse cx="150" cy="150" rx="20" ry="26" fill="#FBD2A4" opacity="0.45" filter="url(#soft)"/>
    <!-- rim light, right -->
    <path d="M240 130 C 252 158 250 200 232 224" fill="none" stroke="#C7F84E" stroke-width="5"
          stroke-linecap="round" opacity="0.30" filter="url(#glow)"/>

    <!-- hair cap -->
    <path d="M111 178 C 104 116 138 74 180 74 C 222 74 256 116 249 178
             C 236 142 212 124 180 124 C 148 124 124 142 111 178 Z" fill="url(#hair)"/>
    <!-- hair highlight strand -->
    <path d="M138 110 C 156 92 196 88 224 104" fill="none" stroke="#5A4631" stroke-width="3"
          stroke-linecap="round" opacity="0.7"/>

    <!-- eyebrows -->
    <path d="M138 150 C 148 144 162 144 170 149" fill="none" stroke="#1C140C" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M190 149 C 198 144 212 144 222 150" fill="none" stroke="#1C140C" stroke-width="4.5" stroke-linecap="round"/>

    <!-- eyes -->
    <g>
      <ellipse cx="154" cy="166" rx="9" ry="9.5" fill="#FBF7EE"/>
      <circle cx="156" cy="167" r="4.6" fill="#241A12"/>
      <circle cx="157.6" cy="165" r="1.5" fill="#fff"/>
      <ellipse cx="206" cy="166" rx="9" ry="9.5" fill="#FBF7EE"/>
      <circle cx="204" cy="167" r="4.6" fill="#241A12"/>
      <circle cx="205.6" cy="165" r="1.5" fill="#fff"/>
    </g>

    <!-- glasses -->
    <g fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.95">
      <rect x="135" y="153" width="38" height="27" rx="9"/>
      <rect x="187" y="153" width="38" height="27" rx="9"/>
      <path d="M173 165 C 178 161 182 161 187 165"/>
      <path d="M135 163 L122 167"/>
      <path d="M225 163 L238 167"/>
    </g>

    <!-- nose -->
    <path d="M179 178 C 176 190 172 196 180 199 C 186 197 187 191 184 184" fill="none"
          stroke="#80512B" stroke-width="2.6" stroke-linecap="round"/>

    <!-- smile -->
    <path d="M158 208 C 170 222 190 222 202 208" fill="none" stroke="#5E3A1D" stroke-width="4"
          stroke-linecap="round"/>
    <path d="M163 210 C 172 217 188 217 197 210" fill="#fff" opacity="0.9"/>

    <!-- front orbit arc -->
    <g transform="rotate(-20 180 196)" opacity="0.9">
      <path d="M40 196 A 140 50 0 0 0 320 196" fill="none" stroke="url(#ringGrad)" stroke-width="3"
            stroke-linecap="round" filter="url(#glow)"/>
    </g>

    <!-- floating particles (nods to the disperse-avatar on the site) -->
    <g fill="#C7F84E">
      <circle cx="286" cy="120" r="4.5" filter="url(#glow)"/>
      <circle cx="70" cy="150" r="3.2" filter="url(#glow)"/>
      <circle cx="300" cy="214" r="2.6" opacity="0.85"/>
      <circle cx="58" cy="226" r="3.6" filter="url(#glow)"/>
      <circle cx="250" cy="78" r="2.2" opacity="0.8"/>
      <circle cx="104" cy="84" r="2.4" opacity="0.8"/>
    </g>
  </g>

  <!-- crisp brand ring -->
  <circle cx="180" cy="180" r="158" fill="none" stroke="#C7F84E" stroke-width="2.5" opacity="0.9"/>
  <circle cx="180" cy="180" r="158" fill="none" stroke="#C7F84E" stroke-width="7" opacity="0.18" filter="url(#glow)"/>
</svg>
