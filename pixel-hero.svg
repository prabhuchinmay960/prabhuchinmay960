<svg viewBox="0 0 320 124" width="320" height="124" xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges" role="img" aria-label="Pixel-art retro coding setup">
  <defs>
    <clipPath id="screen"><rect x="104" y="32" width="112" height="48"/></clipPath>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="320" height="124" fill="#0B0B0C"/>

  <!-- starfield -->
  <g fill="#C7F84E" opacity="0.5">
    <rect x="40" y="18" width="3" height="3"/>
    <rect x="288" y="30" width="3" height="3"/>
    <rect x="300" y="58" width="3" height="3"/>
    <rect x="20" y="64" width="3" height="3"/>
  </g>

  <!-- floating pixels (nod to the disperse-avatar particles) -->
  <rect x="58" y="14" width="4" height="4" fill="#C7F84E">
    <animate attributeName="y" values="14;9;14" dur="2.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="250" y="16" width="4" height="4" fill="#C7F84E" opacity="0.85">
    <animate attributeName="y" values="16;11;16" dur="3.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="160" y="10" width="3" height="3" fill="#9FD35A">
    <animate attributeName="y" values="10;6;10" dur="2.2s" repeatCount="indefinite"/>
  </rect>

  <!-- desk -->
  <rect x="0" y="96" width="320" height="28" fill="#15151B"/>
  <rect x="0" y="96" width="320" height="3" fill="#22222C"/>

  <!-- monitor outline (crisp 8-bit black border) -->
  <rect x="92" y="20" width="136" height="74" fill="#050507"/>
  <!-- bezel -->
  <rect x="96" y="24" width="128" height="68" fill="#23232B"/>
  <rect x="96" y="24" width="128" height="3" fill="#33333E"/>
  <!-- screen -->
  <rect x="104" y="32" width="112" height="48" fill="#07140B"/>

  <!-- screen contents -->
  <g clip-path="url(#screen)">
    <!-- window dots -->
    <rect x="108" y="35" width="4" height="4" fill="#FF5F56"/>
    <rect x="116" y="35" width="4" height="4" fill="#FFBD2E"/>
    <rect x="124" y="35" width="4" height="4" fill="#C7F84E"/>
    <!-- code lines -->
    <rect x="110" y="46" width="40" height="4" fill="#C7F84E"/>
    <rect x="154" y="46" width="24" height="4" fill="#5E7E2E"/>
    <rect x="110" y="54" width="24" height="4" fill="#6FA83A"/>
    <rect x="138" y="54" width="52" height="4" fill="#C7F84E"/>
    <rect x="118" y="62" width="56" height="4" fill="#C7F84E"/>
    <rect x="178" y="62" width="16" height="4" fill="#5E7E2E"/>
    <rect x="118" y="70" width="28" height="4" fill="#6FA83A"/>
    <!-- blinking cursor -->
    <rect x="150" y="69" width="6" height="6" fill="#C7F84E">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <!-- scanline -->
    <rect x="104" y="32" width="112" height="3" fill="#C7F84E" opacity="0.14">
      <animate attributeName="y" values="32;77;32" dur="3.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- power LED -->
  <rect x="216" y="85" width="4" height="4" fill="#C7F84E">
    <animate attributeName="opacity" values="1;1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- stand -->
  <rect x="152" y="92" width="16" height="12" fill="#1B1B22"/>
  <rect x="132" y="104" width="56" height="6" fill="#23232B"/>

  <!-- keyboard -->
  <rect x="116" y="106" width="88" height="10" fill="#1E1E26"/>
  <rect x="116" y="106" width="88" height="2" fill="#2C2C38"/>
  <g fill="#33333E">
    <rect x="120" y="110" width="6" height="3"/><rect x="130" y="110" width="6" height="3"/>
    <rect x="140" y="110" width="6" height="3"/><rect x="150" y="110" width="6" height="3"/>
    <rect x="160" y="110" width="6" height="3"/><rect x="170" y="110" width="6" height="3"/>
    <rect x="180" y="110" width="6" height="3"/><rect x="190" y="110" width="6" height="3"/>
  </g>

  <!-- mug -->
  <rect x="236" y="82" width="18" height="16" fill="#C7F84E"/>
  <rect x="236" y="82" width="18" height="3" fill="#9FD35A"/>
  <rect x="254" y="86" width="5" height="3" fill="#9FD35A"/>
  <rect x="256" y="86" width="3" height="9" fill="#9FD35A"/>
  <rect x="254" y="92" width="5" height="3" fill="#9FD35A"/>
  <!-- steam -->
  <rect x="240" y="78" width="4" height="4" fill="#ECEAE3" opacity="0.5">
    <animate attributeName="y" values="80;68;80" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.55;0" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="246" y="78" width="4" height="4" fill="#ECEAE3" opacity="0.4">
    <animate attributeName="y" values="80;70;80" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.45;0" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
